<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portal Hub — Beranda</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Cinzel:wght@400;600;700&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap");

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Libre Baskerville", Georgia, serif;
        background-color: #1a1209;
        background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c9a84c' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        min-height: 100vh;
        color: #e8d5a3;
      }

      /* ════════════════════════
       TYPOGRAPHY
    ════════════════════════ */
      .section-title {
        font-family: "Cinzel", serif;
        color: #c9a84c;
        letter-spacing: 0.15em;
        text-shadow: 0 0 10px rgba(201, 168, 76, 0.4);
      }
      .ornament {
        color: #c9a84c;
      }

      /* ════════════════════════
       HEADER BANNER
    ════════════════════════ */
      #mainHeader {
        background: linear-gradient(
          180deg,
          #0d0905 0%,
          #1a1209 40%,
          #221809 100%
        );
        border-bottom: 3px double #4a3510;
        padding: 2.5rem 1rem 2rem;
        text-align: center;
      }
      #mainHeader h1 {
        font-family: "Cinzel", serif;
        font-size: clamp(2rem, 6vw, 3.25rem);
        font-weight: 700;
        color: #c9a84c;
        text-shadow:
          0 0 30px rgba(201, 168, 76, 0.5),
          2px 2px 6px #000;
        letter-spacing: 0.1em;
        margin: 0.25rem 0;
      }
      #mainHeader .subtitle {
        font-family: "IM Fell English", serif;
        font-size: 0.875rem;
        font-style: italic;
        color: #4a3510;
        margin-top: 0.25rem;
      }

      /* ════════════════════════
       SEARCH + FILTER
    ════════════════════════ */
      #searchWrap {
        max-width: 560px;
        margin: 1.5rem auto 1rem;
        padding: 0 1rem;
        position: relative;
      }
      #searchInput {
        background: #0d0905;
        border: 1px solid #4a3510;
        color: #e8d5a3;
        font-family: "Libre Baskerville", serif;
        font-size: 0.875rem;
        width: 100%;
        padding: 0.6rem 2.75rem 0.6rem 1rem;
        border-radius: 99px;
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
      }
      #searchInput:focus {
        outline: none;
        border-color: #8b6914;
        box-shadow: 0 0 8px rgba(139, 105, 20, 0.3);
      }
      #searchInput::placeholder {
        color: #4a3510;
      }
      .search-icon {
        position: absolute;
        right: 1.75rem;
        top: 50%;
        transform: translateY(-50%);
        color: #4a3510;
        font-size: 0.9rem;
        pointer-events: none;
      }

      #catFilter {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 0.5rem;
        padding: 0.5rem 1rem 1rem;
      }
      .cat-pill {
        padding: 0.3rem 0.9rem;
        border-radius: 99px;
        font-family: "Cinzel", serif;
        font-size: 0.65rem;
        letter-spacing: 0.1em;
        cursor: pointer;
        border: 1px solid #2e1f08;
        background: #1a1209;
        color: #4a3510;
        transition: all 0.2s;
      }
      .cat-pill:hover {
        border-color: #8b6914;
        color: #8b6914;
      }
      .cat-pill.active {
        background: #4a3510;
        border-color: #8b6914;
        color: #e8d5a3;
      }

      /* ════════════════════════
       PORTAL CARDS GRID
    ════════════════════════ */
      #cardsGrid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
        gap: 1rem;
        padding: 0 1rem 2rem;
        max-width: 1280px;
        margin: 0 auto;
      }

      .portal-card {
        background: linear-gradient(
          135deg,
          #2a1f0e 0%,
          #1a1209 60%,
          #221809 100%
        );
        border: 1px solid #3d2b0a;
        border-radius: 4px;
        padding: 1rem;
        display: flex;
        flex-direction: column;
        gap: 0.6rem;
        position: relative;
        overflow: hidden;
        transition:
          transform 0.25s,
          border-color 0.25s,
          box-shadow 0.25s;
      }
      .portal-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 2px;
        background: linear-gradient(90deg, transparent, #4a3510, transparent);
        transition: background 0.25s;
      }
      .portal-card:hover {
        transform: translateY(-3px);
        border-color: #8b6914;
        box-shadow:
          0 6px 20px rgba(0, 0, 0, 0.5),
          0 0 12px rgba(139, 105, 20, 0.2);
      }
      .portal-card:hover::before {
        background: linear-gradient(90deg, transparent, #c9a84c, transparent);
      }

      .card-icon {
        font-size: 2.25rem;
        line-height: 1;
      }
      .card-name {
        font-family: "Cinzel", serif;
        font-size: 0.85rem;
        color: #c9a84c;
        letter-spacing: 0.05em;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .card-url {
        font-size: 0.7rem;
        color: #4a3510;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .card-desc {
        font-size: 0.75rem;
        color: #6b4f1e;
        font-style: italic;
        line-height: 1.4;
      }
      .card-cat {
        display: inline-block;
        padding: 0.15rem 0.5rem;
        font-family: "Cinzel", serif;
        font-size: 0.6rem;
        letter-spacing: 0.08em;
        color: #4a3510;
        border: 1px solid #2e1f08;
        border-radius: 99px;
        background: #0d0905;
      }
      .card-owner {
        font-size: 0.65rem;
        color: #3d2b0a;
        font-style: italic;
        text-align: right;
      }
      .card-visit {
        display: block;
        padding: 0.55rem 0.5rem;
        background: linear-gradient(
          180deg,
          #c9a84c 0%,
          #8b6914 50%,
          #c9a84c 100%
        );
        color: #1a1209;
        font-family: "Cinzel", serif;
        font-weight: 700;
        font-size: 0.7rem;
        letter-spacing: 0.05em;
        border: 1px solid #ffd700;
        border-radius: 3px;
        cursor: pointer;
        text-decoration: none;
        text-align: center;
        transition: all 0.2s;
      }
      .card-visit:hover {
        background: linear-gradient(
          180deg,
          #ffd700 0%,
          #c9a84c 50%,
          #ffd700 100%
        );
      }

      /* ════════════════════════
       EMPTY STATE
    ════════════════════════ */
      #emptyState {
        display: none;
        text-align: center;
        padding: 4rem 1rem;
      }
      #emptyState .icon {
        font-size: 4rem;
        margin-bottom: 1rem;
      }
      #emptyState p {
        font-size: 0.875rem;
        color: #4a3510;
        font-style: italic;
        margin-top: 0.5rem;
      }

      /* ════════════════════════
       LOADING SCREEN
    ════════════════════════ */
      #loadingScreen {
        position: fixed;
        inset: 0;
        background: #0d0905;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        transition: opacity 0.4s;
      }
      #loadingScreen.fade-out {
        opacity: 0;
        pointer-events: none;
      }

      .spinner {
        width: 48px;
        height: 48px;
        border: 4px solid #2e1f08;
        border-top-color: #c9a84c;
        border-radius: 50%;
        animation: spin 0.75s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* ════════════════════════
       SCROLLBAR
    ════════════════════════ */
      ::-webkit-scrollbar {
        width: 7px;
      }
      ::-webkit-scrollbar-track {
        background: #0d0905;
      }
      ::-webkit-scrollbar-thumb {
        background: #2e1f08;
        border-radius: 99px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #4a3510;
      }
    </style>
  </head>
  <body>
    <!-- ══════════════════════════════════
       LOADING SCREEN
  ══════════════════════════════════ -->
    <div id="loadingScreen">
      <div class="spinner"></div>
      <p
        class="section-title"
        style="font-size: 0.75rem; letter-spacing: 0.25em">
        MEMUAT...
      </p>
    </div>

    <!-- ══════════════════════════════════
       HEADER
  ══════════════════════════════════ -->
    <header id="mainHeader">
      <div class="ornament" style="font-size: 1.5rem; margin-bottom: 0.25rem">
        ⚜ ✦ ⚜
      </div>
      <h1>PORTAL HUB</h1>
      <p class="subtitle">— Gerbang Menuju Berbagai Penjuru Dunia Maya —</p>
      <div class="ornament" style="font-size: 1.5rem; margin-top: 0.25rem">
        ⚜ ✦ ⚜
      </div>
    </header>

    <!-- ══════════════════════════════════
       SEARCH
  ══════════════════════════════════ -->
    <div id="searchWrap">
      <input id="searchInput" type="text" placeholder="Cari portal..." />
      <span class="search-icon">🔍</span>
    </div>

    <!-- ══════════════════════════════════
       CATEGORY FILTER
  ══════════════════════════════════ -->
    <div id="catFilter">
      <button type="button" class="cat-pill active" data-cat="all">
        SEMUA
      </button>
      <button type="button" class="cat-pill" data-cat="Umum">UMUM</button>
      <button type="button" class="cat-pill" data-cat="Alat">ALAT</button>
      <button type="button" class="cat-pill" data-cat="Media">MEDIA</button>
      <button type="button" class="cat-pill" data-cat="Edukasi">EDUKASI</button>
      <button type="button" class="cat-pill" data-cat="Sosial">SOSIAL</button>
      <button type="button" class="cat-pill" data-cat="Lainnya">LAINNYA</button>
    </div>

    <!-- ══════════════════════════════════
       CARDS GRID
  ══════════════════════════════════ -->
    <div id="cardsGrid"></div>

    <!-- Empty state -->
    <div id="emptyState">
      <div class="icon">🗺️</div>
      <p class="section-title" style="font-size: 1rem">Belum Ada Portal</p>
      <p>Belum ada portal yang tersedia saat ini.</p>
    </div>

    <!-- ══════════════════════════════════
       FOOTER
  ══════════════════════════════════ -->
    <footer
      style="
        text-align: center;
        padding: 1.5rem 1rem;
        border-top: 1px solid #2e1f08;
        margin-top: 1rem;
      ">
      <div class="ornament" style="font-size: 1rem; margin-bottom: 0.25rem">
        ⚜
      </div>
      <p
        style="
          font-family: 'Cinzel', serif;
          font-size: 0.7rem;
          letter-spacing: 0.2em;
          color: #2e1f08;
        ">
        PORTAL HUB — MCMXXIV
      </p>
      <p
        style="
          font-family: 'IM Fell English', serif;
          font-size: 0.75rem;
          font-style: italic;
          color: #2e1f08;
          margin-top: 0.25rem;
        ">
        Semua jalan menuju satu gerbang.
      </p>
    </footer>

    <!-- ════════════════════════════════════════════════
     FIREBASE + LOGIC
════════════════════════════════════════════════ -->
    <script type="module">
      import {initializeApp} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
      import {getAnalytics} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-analytics.js";
      import {
        getDatabase,
        ref,
        onValue,
      } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

      /* ── Init ── */
      const firebaseConfig = {
        apiKey: "AIzaSyD0wGQUotPa-BbMkM26XMEXuRP9e3w5Ki0",
        authDomain: "website-7cf1e.firebaseapp.com",
        projectId: "website-7cf1e",
        databaseURL:
          "https://website-7cf1e-default-rtdb.asia-southeast1.firebasedatabase.app",
        storageBucket: "website-7cf1e.firebasestorage.app",
        messagingSenderId: "58232236783",
        appId: "1:58232236783:web:c126504993e70b7b67891a",
        measurementId: "G-6LLX704LMP",
      };
      const fbApp = initializeApp(firebaseConfig);
      getAnalytics(fbApp);
      const db = getDatabase(fbApp);

      /* ════════════════════════════════════════════════
     STATE
  ════════════════════════════════════════════════ */
      let allLinks = {}; // { id: linkObj }
      let activeCat = "all";

      /* ════════════════════════════════════════════════
     LOADING SCREEN
  ════════════════════════════════════════════════ */
      function hideLoading() {
        const ls = document.getElementById("loadingScreen");
        ls.classList.add("fade-out");
        setTimeout(() => ls.remove(), 450);
      }

      /* ════════════════════════════════════════════════
     REALTIME DATABASE LISTENER
  ════════════════════════════════════════════════ */
      const linksRef = ref(db, "links");
      onValue(
        linksRef,
        (snapshot) => {
          allLinks = snapshot.val() ?? {};
          hideLoading();
          renderCards();
        },
        (err) => {
          hideLoading();
          console.error("Gagal memuat data:", err);
        },
      );

      /* ════════════════════════════════════════════════
     RENDER CARDS
  ════════════════════════════════════════════════ */
      function renderCards() {
        const grid = document.getElementById("cardsGrid");
        const empty = document.getElementById("emptyState");
        const search = document
          .getElementById("searchInput")
          .value.toLowerCase()
          .trim();

        grid.innerHTML = "";

        /* Filter */
        const entries = Object.entries(allLinks).filter(([, lnk]) => {
          const matchCat = activeCat === "all" || lnk.category === activeCat;
          const matchSearch =
            !search ||
            (lnk.name ?? "").toLowerCase().includes(search) ||
            (lnk.desc ?? "").toLowerCase().includes(search) ||
            (lnk.url ?? "").toLowerCase().includes(search);
          return matchCat && matchSearch;
        });

        /* Sort: newest first */
        entries.sort((a, b) => (b[1].createdAt ?? 0) - (a[1].createdAt ?? 0));

        if (entries.length === 0) {
          empty.style.display = "block";
          return;
        }
        empty.style.display = "none";

        entries.forEach(([id, lnk]) => {
          const card = document.createElement("div");
          card.className = "portal-card";

          const name = esc(lnk.name ?? "");
          const url = esc(lnk.url ?? "#");
          const desc = esc(lnk.desc ?? "");
          const cat = esc(lnk.category ?? "Umum");
          const icon = esc(lnk.icon ?? "🌐");
          const owner = esc((lnk.ownerEmail ?? "").split("@")[0] ?? "—");

          card.innerHTML = `
            <div style="display:flex; align-items:flex-start; gap:0.75rem;">
              <span class="card-icon">${icon}</span>
              <div style="flex:1; min-width:0;">
                <div class="card-name">${name}</div>
                <div class="card-url">${url}</div>
              </div>
            </div>
            ${desc ? `<p class="card-desc">${desc}</p>` : ""}
            <div style="display:flex; align-items:center; justify-content:space-between; gap:0.5rem;">
              <span class="card-cat">${cat}</span>
              <span class="card-owner">${owner}</span>
            </div>
            <a href="${url}" target="_blank" rel="noopener noreferrer" class="card-visit">➜ Kunjungi</a>
          `;

          grid.appendChild(card);
        });
      }

      /* ════════════════════════════════════════════════
     FILTER KATEGORI
  ════════════════════════════════════════════════ */
      document.getElementById("catFilter").addEventListener("click", (e) => {
        const pill = e.target.closest(".cat-pill");
        if (!pill) return;
        document
          .querySelectorAll(".cat-pill")
          .forEach((p) => p.classList.remove("active"));
        pill.classList.add("active");
        activeCat = pill.dataset.cat;
        renderCards();
      });

      /* ════════════════════════════════════════════════
     SEARCH (debounced)
  ════════════════════════════════════════════════ */
      let searchTimer;
      document.getElementById("searchInput").addEventListener("input", () => {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(renderCards, 180);
      });

      /* ════════════════════════════════════════════════
     HELPERS
  ════════════════════════════════════════════════ */

      /* Escape HTML untuk mencegah XSS saat inject ke innerHTML */
      function esc(str) {
        const d = document.createElement("div");
        d.appendChild(document.createTextNode(String(str)));
        return d.innerHTML;
      }
    </script>
  </body>
</html>
