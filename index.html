<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portal Hub — Beranda</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Cinzel:wght@400;600;700&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap");

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Libre Baskerville", Georgia, serif;
        background-color: #1a1209;
        background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c9a84c' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        min-height: 100vh;
        color: #9e38e7;
      }

      /* ════════════════════════
       TYPOGRAPHY
    ════════════════════════ */
      .section-title {
        font-family: "Cinzel", serif;
        color: #c9a84c;
        letter-spacing: 0.15em;
        text-shadow: 0 0 10px rgba(201, 168, 76, 0.4);
      }
      .ornament {
        color: #c9a84c;
      }

      /* ════════════════════════
       LAYOUT PRIMITIVES
    ════════════════════════ */
      .divider {
        border: none;
        border-top: 1px solid #4a3510;
        position: relative;
        margin: 0.75rem 0;
      }
      .divider::after {
        content: "✦";
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: #1a1209;
        padding: 0 0.5rem;
        color: #4a3510;
        font-size: 0.6rem;
      }
      .divider-gold {
        border-color: #8b6914;
      }
      .divider-gold::after {
        color: #8b6914;
        background: #0d0905;
      }

      /* ════════════════════════
       TOP USER BAR
    ════════════════════════ */
      #userBar {
        background: linear-gradient(90deg, #0d0905, #1a1209, #0d0905);
        border-bottom: 1px solid #2e1f08;
        padding: 0.5rem 1.25rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 0.5rem;
      }
      #userBar .brand {
        font-family: "Cinzel", serif;
        font-size: 0.7rem;
        letter-spacing: 0.2em;
        color: #4a3510;
      }
      #userBar .user-info {
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }
      #userEmailDisplay {
        font-size: 0.75rem;
        color: #8b6914;
        font-style: italic;
        max-width: 200px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      /* ════════════════════════
       HEADER BANNER
    ════════════════════════ */
      #mainHeader {
        background: linear-gradient(
          180deg,
          #0d0905 0%,
          #1a1209 40%,
          #221809 100%
        );
        border-bottom: 3px double #4a3510;
        padding: 2.5rem 1rem 2rem;
        text-align: center;
      }
      #mainHeader h1 {
        font-family: "Cinzel", serif;
        font-size: clamp(2rem, 6vw, 3.25rem);
        font-weight: 700;
        color: #c9a84c;
        text-shadow:
          0 0 30px rgba(201, 168, 76, 0.5),
          2px 2px 6px #000;
        letter-spacing: 0.1em;
        margin: 0.25rem 0;
      }
      #mainHeader .subtitle {
        font-family: "IM Fell English", serif;
        font-size: 0.875rem;
        font-style: italic;
        color: #4a3510;
        margin-top: 0.25rem;
      }
      .header-actions {
        display: flex;
        justify-content: center;
        gap: 0.75rem;
        flex-wrap: wrap;
        margin-top: 1.5rem;
      }

      /* ════════════════════════
       BUTTONS
    ════════════════════════ */
      .gold-btn {
        display: inline-block;
        padding: 0.55rem 1.25rem;
        background: linear-gradient(
          180deg,
          #c9a84c 0%,
          #8b6914 50%,
          #c9a84c 100%
        );
        color: #1a1209;
        font-family: "Cinzel", serif;
        font-weight: 700;
        font-size: 0.8rem;
        letter-spacing: 0.07em;
        border: 1px solid #ffd700;
        border-radius: 3px;
        cursor: pointer;
        text-decoration: none;
        text-align: center;
        transition: all 0.25s ease;
        line-height: 1.5;
      }
      .gold-btn:hover:not(:disabled) {
        background: linear-gradient(
          180deg,
          #ffd700 0%,
          #c9a84c 50%,
          #ffd700 100%
        );
        box-shadow: 0 0 12px rgba(255, 215, 0, 0.4);
      }
      .gold-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .red-btn {
        display: inline-block;
        padding: 0.45rem 1rem;
        background: linear-gradient(
          180deg,
          #8b1a1a 0%,
          #5a0f0f 50%,
          #8b1a1a 100%
        );
        color: #e8d5a3;
        font-family: "Cinzel", serif;
        font-weight: 700;
        font-size: 0.75rem;
        letter-spacing: 0.07em;
        border: 1px solid #c0392b;
        border-radius: 3px;
        cursor: pointer;
        text-decoration: none;
        text-align: center;
        transition: all 0.25s ease;
        line-height: 1.5;
      }
      .red-btn:hover {
        background: linear-gradient(
          180deg,
          #c0392b 0%,
          #8b1a1a 50%,
          #c0392b 100%
        );
        box-shadow: 0 0 10px rgba(192, 57, 43, 0.4);
      }

      .blue-btn {
        display: inline-block;
        padding: 0.55rem 1.25rem;
        background: linear-gradient(
          180deg,
          #1a3a5c 0%,
          #0d2035 50%,
          #1a3a5c 100%
        );
        color: #90caf9;
        font-family: "Cinzel", serif;
        font-weight: 700;
        font-size: 0.8rem;
        letter-spacing: 0.07em;
        border: 1px solid #1e5a7a;
        border-radius: 3px;
        cursor: pointer;
        text-decoration: none;
        text-align: center;
        transition: all 0.25s ease;
        line-height: 1.5;
      }
      .blue-btn:hover {
        background: linear-gradient(
          180deg,
          #1e5a7a 0%,
          #1a3a5c 50%,
          #1e5a7a 100%
        );
        box-shadow: 0 0 10px rgba(30, 90, 122, 0.4);
      }
      .blue-btn.active-mine {
        background: linear-gradient(
          180deg,
          #4a3510 0%,
          #2a1f0e 50%,
          #4a3510 100%
        );
        border-color: #8b6914;
        color: #e8d5a3;
      }

      /* ════════════════════════
       SEARCH + FILTER
    ════════════════════════ */
      #searchWrap {
        max-width: 560px;
        margin: 1.5rem auto 1rem;
        padding: 0 1rem;
        position: relative;
      }
      #searchInput {
        background: #0d0905;
        border: 1px solid #4a3510;
        color: #e8d5a3;
        font-family: "Libre Baskerville", serif;
        font-size: 0.875rem;
        width: 100%;
        padding: 0.6rem 2.75rem 0.6rem 1rem;
        border-radius: 99px;
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
      }
      #searchInput:focus {
        outline: none;
        border-color: #8b6914;
        box-shadow: 0 0 8px rgba(139, 105, 20, 0.3);
      }
      #searchInput::placeholder {
        color: #4a3510;
      }
      .search-icon {
        position: absolute;
        right: 1.75rem;
        top: 50%;
        transform: translateY(-50%);
        color: #4a3510;
        font-size: 0.9rem;
        pointer-events: none;
      }

      #catFilter {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 0.5rem;
        padding: 0.5rem 1rem 1rem;
      }
      .cat-pill {
        padding: 0.3rem 0.9rem;
        border-radius: 99px;
        font-family: "Cinzel", serif;
        font-size: 0.65rem;
        letter-spacing: 0.1em;
        cursor: pointer;
        border: 1px solid #2e1f08;
        background: #1a1209;
        color: #4a3510;
        transition: all 0.2s;
      }
      .cat-pill:hover {
        border-color: #8b6914;
        color: #8b6914;
      }
      .cat-pill.active {
        background: #4a3510;
        border-color: #8b6914;
        color: #e8d5a3;
      }

      /* ════════════════════════
       VIEW LABEL
    ════════════════════════ */
      #viewLabel {
        text-align: center;
        font-family: "Cinzel", serif;
        font-size: 0.75rem;
        letter-spacing: 0.2em;
        color: #4a3510;
        margin-bottom: 1rem;
        padding: 0 1rem;
      }

      /* ════════════════════════
       PORTAL CARDS GRID
    ════════════════════════ */
      #cardsGrid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
        gap: 1rem;
        padding: 0 1rem 2rem;
        max-width: 1280px;
        margin: 0 auto;
      }

      .portal-card {
        background: linear-gradient(
          135deg,
          #2a1f0e 0%,
          #1a1209 60%,
          #221809 100%
        );
        border: 1px solid #3d2b0a;
        border-radius: 4px;
        padding: 1rem;
        display: flex;
        flex-direction: column;
        gap: 0.6rem;
        position: relative;
        overflow: hidden;
        transition:
          transform 0.25s,
          border-color 0.25s,
          box-shadow 0.25s;
      }
      .portal-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 2px;
        background: linear-gradient(90deg, transparent, #4a3510, transparent);
        transition: background 0.25s;
      }
      .portal-card:hover {
        transform: translateY(-3px);
        border-color: #8b6914;
        box-shadow:
          0 6px 20px rgba(0, 0, 0, 0.5),
          0 0 12px rgba(139, 105, 20, 0.2);
      }
      .portal-card:hover::before {
        background: linear-gradient(90deg, transparent, #c9a84c, transparent);
      }

      .card-icon {
        font-size: 2.25rem;
        line-height: 1;
      }
      .card-name {
        font-family: "Cinzel", serif;
        font-size: 0.85rem;
        color: #c9a84c;
        letter-spacing: 0.05em;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .card-url {
        font-size: 0.7rem;
        color: #4a3510;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .card-desc {
        font-size: 0.75rem;
        color: #6b4f1e;
        font-style: italic;
        line-height: 1.4;
      }
      .card-cat {
        display: inline-block;
        padding: 0.15rem 0.5rem;
        font-family: "Cinzel", serif;
        font-size: 0.6rem;
        letter-spacing: 0.08em;
        color: #4a3510;
        border: 1px solid #2e1f08;
        border-radius: 99px;
        background: #0d0905;
      }
      .card-owner {
        font-size: 0.65rem;
        color: #3d2b0a;
        font-style: italic;
        text-align: right;
      }
      .card-actions {
        display: flex;
        gap: 0.4rem;
        margin-top: 0.25rem;
      }
      .card-visit {
        flex: 1;
        padding: 0.45rem 0.5rem;
        background: linear-gradient(
          180deg,
          #c9a84c 0%,
          #8b6914 50%,
          #c9a84c 100%
        );
        color: #1a1209;
        font-family: "Cinzel", serif;
        font-weight: 700;
        font-size: 0.7rem;
        letter-spacing: 0.05em;
        border: 1px solid #ffd700;
        border-radius: 3px;
        cursor: pointer;
        text-decoration: none;
        text-align: center;
        transition: all 0.2s;
        display: block;
      }
      .card-visit:hover {
        background: linear-gradient(
          180deg,
          #ffd700 0%,
          #c9a84c 50%,
          #ffd700 100%
        );
      }
      .card-edit {
        padding: 0.45rem 0.55rem;
        font-size: 0.75rem;
        background: #1a2e1a;
        border: 1px solid #2e5c2e;
        color: #81c784;
        border-radius: 3px;
        cursor: pointer;
        transition: all 0.2s;
      }
      .card-edit:hover {
        background: #2e5c2e;
      }
      .card-delete {
        padding: 0.45rem 0.55rem;
        font-size: 0.75rem;
        background: #3a1a1a;
        border: 1px solid #7b2020;
        color: #ef9a9a;
        border-radius: 3px;
        cursor: pointer;
        transition: all 0.2s;
      }
      .card-delete:hover {
        background: #7b2020;
      }

      /* ════════════════════════
       EMPTY STATE
    ════════════════════════ */
      #emptyState {
        display: none;
        text-align: center;
        padding: 4rem 1rem;
      }
      #emptyState .icon {
        font-size: 4rem;
        margin-bottom: 1rem;
      }
      #emptyState p {
        font-size: 0.875rem;
        color: #4a3510;
        font-style: italic;
        margin-top: 0.5rem;
      }

      /* ════════════════════════
       MODALS
    ════════════════════════ */
      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.82);
        z-index: 500;
        display: none;
        justify-content: center;
        align-items: center;
        padding: 1rem;
      }
      .modal-overlay.open {
        display: flex;
      }

      .modal-box {
        background: linear-gradient(
          160deg,
          #2a1f0e 0%,
          #1a1209 60%,
          #2a1f0e 100%
        );
        border: 2px solid #8b6914;
        box-shadow:
          0 0 0 4px #0d0905,
          0 0 0 6px #4a3510,
          0 0 40px rgba(139, 105, 20, 0.5);
        border-radius: 4px;
        padding: 2rem;
        width: 100%;
        max-width: 460px;
        position: relative;
        max-height: 90vh;
        overflow-y: auto;
      }
      .modal-box::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 3px;
        background: linear-gradient(90deg, transparent, #c9a84c, transparent);
      }

      .modal-title {
        font-family: "Cinzel", serif;
        color: #c9a84c;
        font-size: 1.1rem;
        letter-spacing: 0.1em;
        margin-bottom: 0.25rem;
      }
      .modal-close {
        position: absolute;
        top: 1rem;
        right: 1rem;
        background: none;
        border: none;
        color: #4a3510;
        font-size: 1.1rem;
        cursor: pointer;
        transition: color 0.2s;
      }
      .modal-close:hover {
        color: #c9a84c;
      }

      .form-label-m {
        font-family: "Cinzel", serif;
        font-size: 0.65rem;
        letter-spacing: 0.1em;
        color: #8b6914;
        display: block;
        margin-bottom: 0.3rem;
      }
      .form-input-m {
        background: #0d0905;
        border: 1px solid #2e1f08;
        color: #e8d5a3;
        font-family: "Libre Baskerville", serif;
        font-size: 0.825rem;
        width: 100%;
        padding: 0.55rem 0.85rem;
        border-radius: 3px;
        transition: border-color 0.2s;
      }
      .form-input-m:focus {
        outline: none;
        border-color: #8b6914;
        box-shadow: 0 0 6px rgba(139, 105, 20, 0.2);
      }
      .form-input-m::placeholder {
        color: #2e1f08;
      }
      select.form-input-m option {
        background: #1a1209;
      }

      .modal-actions {
        display: flex;
        gap: 0.6rem;
        margin-top: 1.25rem;
      }
      .modal-actions .gold-btn {
        flex: 1;
        padding: 0.6rem;
        font-size: 0.8rem;
      }
      .modal-actions .red-btn {
        padding: 0.6rem 1rem;
        font-size: 0.8rem;
      }

      /* ════════════════════════
       LOADING SCREEN
    ════════════════════════ */
      #loadingScreen {
        position: fixed;
        inset: 0;
        background: #0d0905;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        transition: opacity 0.4s;
      }
      #loadingScreen.fade-out {
        opacity: 0;
        pointer-events: none;
      }

      .spinner {
        width: 48px;
        height: 48px;
        border: 4px solid #2e1f08;
        border-top-color: #c9a84c;
        border-radius: 50%;
        animation: spin 0.75s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* ════════════════════════
       TOAST NOTIFICATION
    ════════════════════════ */
      #toast {
        position: fixed;
        bottom: 1.5rem;
        right: 1.5rem;
        z-index: 9000;
        padding: 0.75rem 1.25rem;
        border-radius: 4px;
        font-size: 0.825rem;
        font-family: "Libre Baskerville", serif;
        max-width: 320px;
        transform: translateX(150%);
        transition: transform 0.3s ease;
        line-height: 1.4;
      }
      #toast.show {
        transform: translateX(0);
      }
      #toast.t-success {
        background: #1a3a1a;
        border: 1px solid #2e7d32;
        color: #a5d6a7;
      }
      #toast.t-error {
        background: #3a1a1a;
        border: 1px solid #c62828;
        color: #ef9a9a;
      }
      #toast.t-info {
        background: #1a2a3a;
        border: 1px solid #1565c0;
        color: #90caf9;
      }

      /* ════════════════════════
       SCROLLBAR
    ════════════════════════ */
      ::-webkit-scrollbar {
        width: 7px;
      }
      ::-webkit-scrollbar-track {
        background: #0d0905;
      }
      ::-webkit-scrollbar-thumb {
        background: #2e1f08;
        border-radius: 99px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #4a3510;
      }
    </style>
  </head>
  <body>
    <!-- ══════════════════════════════════
       LOADING SCREEN
  ══════════════════════════════════ -->
    <div id="loadingScreen">
      <div class="spinner"></div>
      <p
        class="section-title"
        style="font-size: 0.75rem; letter-spacing: 0.25em">
        MEMUAT...
      </p>
    </div>

    <!-- ══════════════════════════════════
       TOAST
  ══════════════════════════════════ -->
    <div id="toast"></div>

    <!-- ══════════════════════════════════
       MODAL — TAMBAH PORTAL
  ══════════════════════════════════ -->
    
    <!-- ══════════════════════════════════
       MODAL — EDIT PORTAL
  ══════════════════════════════════ -->
   

    <!-- ══════════════════════════════════
       TOP USER BAR
  ══════════════════════════════════ -->
    <div id="userBar">
      <span class="brand">✦ PORTAL HUB ✦</span>
      <div class="user-info">
        <span id="userEmailDisplay"></span>
        <button type="button" class="red-btn" id="btnLogout">KELUAR</button>
      </div>
    </div>

    <!-- ══════════════════════════════════
       HEADER
  ══════════════════════════════════ -->
    <header id="mainHeader">
      <div class="ornament" style="font-size: 1.5rem; margin-bottom: 0.25rem">
        ⚜ ✦ ⚜
      </div>
      <h1>PORTAL HUB</h1>
      <p class="subtitle">— Gerbang Menuju Berbagai Penjuru Dunia Maya —</p>
      <div class="ornament" style="font-size: 1.5rem; margin-top: 0.25rem">
        ⚜ ✦ ⚜
      </div>
      </div>
    </header>

    <!-- ══════════════════════════════════
       SEARCH
  ══════════════════════════════════ -->
    <div id="searchWrap">
      <input id="searchInput" type="text" placeholder="Cari portal..." />
      <span class="search-icon">🔍</span>
    </div>

    <!-- ══════════════════════════════════
       CATEGORY FILTER
  ══════════════════════════════════ -->
    <div id="catFilter">
      <button type="button" class="cat-pill active" data-cat="all">
        SEMUA
      </button>
      <button type="button" class="cat-pill" data-cat="Umum">UMUM</button>
      <button type="button" class="cat-pill" data-cat="Alat">ALAT</button>
      <button type="button" class="cat-pill" data-cat="Media">MEDIA</button>
      <button type="button" class="cat-pill" data-cat="Edukasi">EDUKASI</button>
      <button type="button" class="cat-pill" data-cat="Sosial">SOSIAL</button>
      <button type="button" class="cat-pill" data-cat="Lainnya">LAINNYA</button>
    </div>

    <!-- View label -->
    <div id="viewLabel">✦ SEMUA PORTAL ✦</div>

    <!-- ══════════════════════════════════
       CARDS GRID
  ══════════════════════════════════ -->
    <div id="cardsGrid"></div>

    <!-- Empty state -->
    <div id="emptyState">
      <div class="icon">🗺️</div>
      <p class="section-title" style="font-size: 1rem">Belum Ada Portal</p>
    </div>

    <!-- ══════════════════════════════════
       FOOTER
  ══════════════════════════════════ -->
    <footer
      style="
        text-align: center;
        padding: 1.5rem 1rem;
        border-top: 1px solid #2e1f08;
        margin-top: 1rem;
      ">
      <div class="ornament" style="font-size: 1rem; margin-bottom: 0.25rem">
        ⚜
      </div>
      <p
        style="
          font-family: &quot;Cinzel&quot;, serif;
          font-size: 0.7rem;
          letter-spacing: 0.2em;
          color: #2e1f08;
        ">
        PORTAL HUB — MCMXXIV
      </p>
      <p
        style="
          font-family: &quot;IM Fell English&quot;, serif;
          font-size: 0.75rem;
          font-style: italic;
          color: #2e1f08;
          margin-top: 0.25rem;
        ">
        Semua jalan menuju satu gerbang.
      </p>
    </footer>

    <!-- ════════════════════════════════════════════════
     FIREBASE + LOGIC
════════════════════════════════════════════════ -->
    <script type="module">
      import {initializeApp} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
      import {getAnalytics} from "https://www.gstatic.com/firebasejs/12.12.1/firebase-analytics.js";
      import {
        getAuth,
        onAuthStateChanged,
        signOut,
      } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
      import {
        getDatabase,
        ref,
        push,
        set,
        update,
        remove,
        onValue,
      } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

      /* ── Init ── */
      const firebaseConfig = {
        apiKey: "AIzaSyD0wGQUotPa-BbMkM26XMEXuRP9e3w5Ki0",
        authDomain: "website-7cf1e.firebaseapp.com",
        projectId: "website-7cf1e",
        databaseURL:
          "https://website-7cf1e-default-rtdb.asia-southeast1.firebasedatabase.app",
        storageBucket: "website-7cf1e.firebasestorage.app",
        messagingSenderId: "58232236783",
        appId: "1:58232236783:web:c126504993e70b7b67891a",
        measurementId: "G-6LLX704LMP",
      };
      const fbApp = initializeApp(firebaseConfig);
      getAnalytics(fbApp);
      const auth = getAuth(fbApp);
      const db = getDatabase(fbApp);

      /* ════════════════════════════════════════════════
     STATE
  ════════════════════════════════════════════════ */
      let currentUser = null;
      let allLinks = {}; // { id: linkObj }
      let activeCat = "all";
      let showMine = false;
      let dbUnsubscribe = null; // cleanup listener saat logout

      /* ════════════════════════════════════════════════
     LOADING SCREEN — hilang setelah auth check
  ════════════════════════════════════════════════ */
      function hideLoading() {
        const ls = document.getElementById("loadingScreen");
        ls.classList.add("fade-out");
        setTimeout(() => ls.remove(), 450);
      }

      /* ════════════════════════════════════════════════
     AUTH GUARD
     - Belum login → login.html
     - Login tapi email belum verify → logout → login.html?verify=1
     - OK → tampilkan halaman
  ════════════════════════════════════════════════ */
      onAuthStateChanged(auth, async (user) => {
        if (!user) {
          window.location.replace("login.html");
          return;
        }
        if (!user.emailVerified) {
          await signOut(auth);
          window.location.replace("login.html?verify=1");
          return;
        }

        /* User valid */
        currentUser = user;
        document.getElementById("userEmailDisplay").textContent = user.email;
        hideLoading();
        startDBListener();
      });

      /* ════════════════════════════════════════════════
     REALTIME DATABASE LISTENER
  ════════════════════════════════════════════════ */
      function startDBListener() {
        if (dbUnsubscribe) dbUnsubscribe(); // bersihkan listener lama jika ada
        const linksRef = ref(db, "links");
        // onValue mengembalikan fungsi unsubscribe
        dbUnsubscribe = onValue(
          linksRef,
          (snapshot) => {
            allLinks = snapshot.val() ?? {};
            renderCards();
          },
          (err) => {
            toast("Gagal memuat data: " + err.message, "error");
          },
        );
      }

      /* ════════════════════════════════════════════════
     RENDER CARDS
  ════════════════════════════════════════════════ */
      function renderCards() {
        const grid = document.getElementById("cardsGrid");
        const empty = document.getElementById("emptyState");
        const search = document
          .getElementById("searchInput")
          .value.toLowerCase()
          .trim();

        grid.innerHTML = "";

        /* Filter */
        const entries = Object.entries(allLinks).filter(([, lnk]) => {
          const matchCat = activeCat === "all" || lnk.category === activeCat;
          const matchMine = !showMine || lnk.owner === currentUser?.uid;
          const matchSearch =
            !search ||
            (lnk.name ?? "").toLowerCase().includes(search) ||
            (lnk.desc ?? "").toLowerCase().includes(search) ||
            (lnk.url ?? "").toLowerCase().includes(search);
          return matchCat && matchMine && matchSearch;
        });

        /* Sort: newest first */
        entries.sort((a, b) => (b[1].createdAt ?? 0) - (a[1].createdAt ?? 0));

        if (entries.length === 0) {
          empty.style.display = "block";
          return;
        }
        empty.style.display = "none";

        entries.forEach(([id, lnk]) => {
          const isOwner = currentUser && lnk.owner === currentUser.uid;
          const card = document.createElement("div");
          card.className = "portal-card";

          /* Sanitize sebelum inject ke innerHTML */
          const name = esc(lnk.name ?? "");
          const url = esc(lnk.url ?? "#");
          const desc = esc(lnk.desc ?? "");
          const cat = esc(lnk.category ?? "Umum");
          const icon = esc(lnk.icon ?? "🌐");
          const owner = esc((lnk.ownerEmail ?? "").split("@")[0] ?? "—");

          card.innerHTML = `
        <div style="display:flex; align-items:flex-start; gap:0.75rem;">
          <span class="card-icon">${icon}</span>
          <div style="flex:1; min-width:0;">
            <div class="card-name">${name}</div>
            <div class="card-url">${url}</div>
          </div>
        </div>
        ${desc ? `<p class="card-desc">${desc}</p>` : ""}
        <div style="display:flex; align-items:center; justify-content:space-between; gap:0.5rem;">
          <span class="card-cat">${cat}</span>
          <span class="card-owner">${owner}</span>
        </div>
        <div class="card-actions">
          <a href="${url}" target="_blank" rel="noopener noreferrer" class="card-visit">➜ Kunjungi</a>
          ${
            isOwner
              ? `
            <button type="button" class="card-edit"  data-id="${id}">✏</button>
            <button type="button" class="card-delete" data-id="${id}">🗑</button>
          `
              : ""
          }
        </div>
      `;

          /* Pasang event listener via data-id — bukan onclick inline
         agar terhindar dari bug XSS & closure stale reference     */
          if (isOwner) {
            card
              .querySelector(".card-edit")
              .addEventListener("click", () => openEdit(id));
            card
              .querySelector(".card-delete")
              .addEventListener("click", () => deleteLink(id));
          }

          grid.appendChild(card);
        });
      }

      /* ════════════════════════════════════════════════
     TAMBAH PORTAL
  ════════════════════════════════════════════════ */

      /* ════════════════════════════════════════════════
     EDIT PORTAL
  ════════════════════════════════════════════════ */

      /* ════════════════════════════════════════════════
     HAPUS PORTAL
  ════════════════════════════════════════════════ */

    
      /* ════════════════════════════════════════════════
     FILTER KATEGORI
  ════════════════════════════════════════════════ */
      document.getElementById("catFilter").addEventListener("click", (e) => {
        const pill = e.target.closest(".cat-pill");
        if (!pill) return;
        document
          .querySelectorAll(".cat-pill")
          .forEach((p) => p.classList.remove("active"));
        pill.classList.add("active");
        activeCat = pill.dataset.cat;
        renderCards();
      });

      /* ════════════════════════════════════════════════
     SEARCH (debounced)
  ════════════════════════════════════════════════ */
      let searchTimer;
      document.getElementById("searchInput").addEventListener("input", () => {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(renderCards, 180);
      });

      /* ════════════════════════════════════════════════
     TOGGLE PORTAL SAYA
  ════════════════════════════════════════════════ */
      document.getElementById("btnMyLinks").addEventListener("click", () => {
        showMine = !showMine;
        const btn = document.getElementById("btnMyLinks");
        const label = document.getElementById("viewLabel");
        if (showMine) {
          btn.classList.add("active-mine");
          label.textContent = "✦ PORTAL SAYA ✦";
        } else {
          btn.classList.remove("active-mine");
          label.textContent = "✦ SEMUA PORTAL ✦";
        }
        renderCards();
      });

      /* ════════════════════════════════════════════════
     LOGOUT
  ════════════════════════════════════════════════ */
      document
        .getElementById("btnLogout")
        .addEventListener("click", async () => {
          if (dbUnsubscribe) {
            dbUnsubscribe();
            dbUnsubscribe = null;
          }
          await signOut(auth);
          window.location.replace("login.html");
        });

      /* ════════════════════════════════════════════════
     TUTUP MODAL KLIK DI LUAR
  ════════════════════════════════════════════════ */
      document.querySelectorAll(".modal-overlay").forEach((overlay) => {
        overlay.addEventListener("click", (e) => {
          if (e.target === overlay) overlay.classList.remove("open");
        });
      });

      /* ════════════════════════════════════════════════
     HELPERS
  ════════════════════════════════════════════════ */
      let toastTimer;
      function toast(msg, type = "info") {
        const el = document.getElementById("toast");
        el.textContent = msg;
        el.className = "show t-" + type;
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => el.classList.remove("show"), 3500);
      }

      /* Escape HTML untuk mencegah XSS saat inject ke innerHTML */
      function esc(str) {
        const d = document.createElement("div");
        d.appendChild(document.createTextNode(String(str)));
        return d.innerHTML;
      }
    </script>
  </body>
</html>
